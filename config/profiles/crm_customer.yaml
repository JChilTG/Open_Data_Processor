# Example profile for a single data feed.
# A profile fully describes one feed: where raw data lands, where bronze goes,
# the schema, which fields are "business" fields, and how to clean/validate.
# Only values that differ from config/defaults.yaml need to be set here.

profile_name: crm_customer          # stamped onto every bronze row

source:
  format: txt                       # txt | csv | parquet
  path: "abfss://landing@myaccount.dfs.core.windows.net/crm/customer/"
  file_glob: "*.txt"
  # Optional: capture parts of the path/filename into _token_* columns.
  # path_template: "crm/customer/data_{extract_date}/{region}/current.txt"
  #   -> adds _token_extract_date and _token_region to the bronze table.
  # file_readiness is optional and off by default (see defaults.yaml). Example:
  # file_readiness:
  #   enabled: true
  #   success_marker: "_SUCCESS"
  #   min_file_age_minutes: 5
  options:
    sep: "|"
    header: true
    encoding: "UTF-8"
    quote: '"'
    escape: '"'
    multiLine: false

schema:                             # explicit, ordered
  # sql_length sets the NVARCHAR length in the generated dedicated-pool DDL
  # (use "max" for the pool's NVARCHAR cap, sql_pool.max_string_length <= 4000);
  # sql_type can fully override the pool type.
  - {name: customer_id, type: long,           required: true}
  - {name: email,       type: string,         required: false, sql_length: 256, regex: '^[^@\s]+@[^@\s]+\.[^@\s]+$'}
  - {name: full_name,   type: string,         required: false, sql_length: 256}
  - {name: signup_dt,   type: date,           required: false, format: "yyyy-MM-dd"}
  - {name: balance,     type: "decimal(18,2)", required: false}
  - {name: notes,       type: string,         required: false}   # free text, gets sanitised

parsing:
  null_values: ["", "NULL", "N/A", "\\N"]
  decimal_sep: "."
  thousands_sep: ","
  date_format: "yyyy-MM-dd"

business_fields: [customer_id, email, signup_dt]   # used to build the _change_key hash

sanitisation:
  enabled: true
  strip_control_chars: true
  normalise_whitespace: true
  strip_bom: true
  remove_chars: ["\u0000"]

quality:
  max_quarantine_pct: 25
  schema_evolution: extra_cols_map
  dedup:
    on_change_key: true

target:
  database: bronze
  table: crm_customer
  path: "abfss://bronze@myaccount.dfs.core.windows.net/crm/customer/"
  write_mode: append
  partition_by: ["_bronze_load_date"]

quarantine:
  path: "abfss://quarantine@myaccount.dfs.core.windows.net/crm/customer/"

sql_pool:
  enabled: true
  database: edw             # dedicated SQL pool database in this workspace
  schema: bronze
  table: crm_customer
  temp_folder: "abfss://staging@myaccount.dfs.core.windows.net/synapse_tmp"
  mode: append
  distribution: HASH
  hash_column: customer_id

