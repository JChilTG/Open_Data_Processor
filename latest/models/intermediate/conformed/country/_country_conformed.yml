version: 2

models:
  - name: int_country__conformed
    description: >
      Conformed country dimension. Every domain's marts join to this (via
      marts/shared/dim_country) rather than re-deriving country attributes.
    columns:
      - name: country_iso3
        description: Canonical key.
        tests: [not_null, unique]

  - name: int_demo_source_country__resolved
    description: >
      WORKED EXAMPLE ONLY — resolves the demo source's raw country values to the
      conformed country key. Not real source data; see the model file's header comment
      for how to copy this pattern for an actual source system.
    columns:
      - name: demo_record_id
        tests: [not_null, unique]
      - name: country_iso3
        description: Conformed key, guaranteed non-null (falls back to UNKNOWN).
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_country__conformed')
                field: country_iso3
