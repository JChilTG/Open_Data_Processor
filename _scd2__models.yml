version: 2

models:
  - name: entity_scd2
    description: >
      Append-only SCD2 version history. Every row is an immutable version of
      an entity that starts at _landing_extract_date; rows are only ever inserted,
      never updated or deleted. Query entity_scd2_versioned for valid_to /
      is_current / point-in-time lookups.
    columns:
      - name: entity_id
        data_tests:
          - not_null
      - name: _landing_extract_date
        data_tests:
          - not_null
      - name: attribute_hash
        description: >
          Null only on a deletion marker row (is_deleted = 1), which only
          occurs when the detect_deletions config is enabled.
      - name: is_deleted
        description: >
          1 if this row marks the entity disappearing from a full snapshot.
          Always 0 when the detect_deletions config is off (the default).
        data_tests:
          - not_null

  - name: entity_scd2_versioned
    description: >
      View over entity_scd2 that derives valid_from/valid_to/is_current via
      LEAD(_landing_extract_date). Use this model for "as of" queries and for finding
      the current version of an entity.
    columns:
      - name: entity_id
        data_tests:
          - not_null
      - name: valid_from
        data_tests:
          - not_null
      - name: is_deleted
        data_tests:
          - not_null
