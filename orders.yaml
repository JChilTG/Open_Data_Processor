# Example table profile for the incremental Delta -> Dedicated SQL Pool
# loader (delta_to_dedicated_sql_incremental_load.py). Upload one file like
# this per table into the ADLS Gen2 "metadata" container, under the path
# pointed to by METADATA_CONTAINER_PATH in the notebook.

delta_path: "abfss://raw@<storage-account>.dfs.core.windows.net/sales/orders"
target_schema: dbo
target_table: Orders

# "Already loaded" is decided purely by this watermark, not a business key:
# daily runs only read rows newer than MAX(watermark_column) already in the
# target. Omit this field entirely to use the default, _bronze_loaded_at_utc_ts
# - only set it explicitly if this table's bronze ingestion timestamp column
# is named something else. Must be assigned once, atomically, per ingestion
# batch (never changes afterward) for the incremental logic to be correct.
watermark_column: _bronze_loaded_at_utc_ts

# Only used the first time this table is created in the pool.
distribution: HASH
distribution_column: OrderId
table_structure: CLUSTERED COLUMNSTORE INDEX

# Optional: override the automatic Spark -> SQL type mapping for specific
# columns, e.g. a free-text column that would otherwise default to
# NVARCHAR(4000) and could truncate.
# column_type_overrides:
#   Notes: "NVARCHAR(MAX)"
